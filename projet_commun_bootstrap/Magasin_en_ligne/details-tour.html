<!doctype html>
<html lang="fr">

  <head>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css">
    <!-- Custom CSS link -->
    <link rel="stylesheet" href="../css/style.css">

    <title>Accueil: Agence</title>

  </head>

  <body>
    
    <header>
        
        <nav class="navbar navbar-expand-lg navbar-expand-md bg-primary fixed-top" data-bs-theme="dark">
            <div class="container-fluid col-11 col-lg-10 col-xl-9">
                <a class="navbar-brand" href="../Agence/index.html">Brand</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav mx-auto">
                        <li class="nav-item">
                            <a class="nav-link text-center" href="../Agence/index.html">Accueil</a>
                        </li>
                        <li class="nav-item text-center">
                            <a class="nav-link" href="../Agence/team.html">Notre équipe</a>
                        </li>
                        <li class="nav-item text-center">
                            <a class="nav-link active" href="../Magasin_en_ligne/catalogue.html">Catalogue</a>
                        </li>
                    </ul>
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="btn btn-secondary text-primary w-100 fw-bold" href="../Agence/contact.html">Contact</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
        
    </header>

    <main class="d-flex align-items-center flex-column pt-5 mt-5 mb-5 bg-ligth">
        
        <div class="container col-12 col-lg-10 col-xl-9 py-5">
            <div class="row">
                <!-- Images -->
                <div class="col-md-6 mb-4">
                    <div class="card border border-1 border-primary">
                        <img src="../assets/img/products/tour.jpg" class="card-img-top" alt="Product Image">
                        <div class="card-body ">
                            <div class="row g-2">
                                <div class="col-3">
                                    <img src="../assets/img/products/tour.jpg" class="img-thumbnail" alt="image 1">
                                </div>
                                <div class="col-3">
                                    <img src="../assets/img/products/tour.jpg" class="img-thumbnail" alt="image 2">
                                </div>
                                <div class="col-3">
                                    <img src="../assets/img/products/tour.jpg" class="img-thumbnail" alt="image 3">
                                </div>
                                <div class="col-3">
                                    <img src="../assets/img/products/tour.jpg" class="img-thumbnail" alt="image 4">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Details -->
                <div class="col-md-6">
                    <h1 class="h2 mb-3">Une superbe tour </h1>
                    <div class="mb-3">
                        <span class="h4 me-2">1200€</span>
                        <span class="text-muted text-decoration-line-through">1500€</span>
                        <span class="badge bg-danger ms-2">25% de réduction</span>
                    </div>

                    <div class="mb-3">
                        <div class="d-flex align-items-center">
                            <div class="text-warning me-2">
                                <i class="bi bi-star-fill"></i>
                                <i class="bi bi-star-fill"></i>
                                <i class="bi bi-star-fill"></i>
                                <i class="bi bi-star-fill"></i>
                                <i class="bi bi-star-half"></i>
                            </div>
                            <span class="text-muted">(128 commentaires)</span>
                        </div>
                    </div>

                    <p class="mb-4">Une superbe tour parfaitement équipée et faite pour le gaming !</p>

                    <!-- Selection -->
                    <div class="mb-4">
                        <h6 class="mb-2">Couleur</h6>
                        <div class="btn-group" role="group">
                            <input type="radio" class="btn-check" name="color" id="silver" checked>
                            <label class="btn btn-outline-secondary" for="silver">Argent</label>
                            <input type="radio" class="btn-check" name="color" id="gold">
                            <label class="btn btn-outline-secondary" for="gold">Noir</label>
                            <input type="radio" class="btn-check" name="color" id="black">
                            <label class="btn btn-outline-secondary" for="black">Blanc</label>
                        </div>
                    </div>

                    <!-- Quantité -->
                    <div class="mb-4">
                        <div class="d-flex align-items-center">
                            <label class="me-2">Quantité:</label>
                            <select class="form-select w-auto">
                                    <option>1</option>
                                    <option>2</option>
                                    <option>3</option>
                                    <option>4</option>
                                    <option>5</option>
                                </select>
                        </div>
                    </div>

                    <!-- Actions -->
                    <div class="d-grid gap-2">
                        <button class="btn btn-primary" type="button">Ajouter au panier</button>
                        <button class="btn btn-outline-secondary" type="button">
                            <i class="text-danger bi bi-heart-fill me-2"></i>Ajouter à la liste de souhait
                        </button>
                    </div>

                    <!-- Info -->
                    <div class="mt-4">
                        <div class="d-flex align-items-center mb-2">
                            <i class="bi bi-truck text-primary me-2"></i>
                            <span>Livraison gratuite à partir de 100€ d'achat</span>
                        </div>
                        <div class="d-flex align-items-center mb-2">
                            <i class="bi bi-arrow-counterclockwise text-primary me-2"></i>
                            <span>politique de retour de 30 jours</span>
                        </div>
                        <div class="d-flex align-items-center">
                            <i class="bi bi-shield-shaded text-primary me-2"></i>
                            <span>2 ans de garantie</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
                
    </main>

    <!-- JS Bootsrap script -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>

</html>
