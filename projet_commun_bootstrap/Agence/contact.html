    <title>Accueil: Agence</title>
  </head>

  <body>
    
    <header>
        
        <nav class="navbar navbar-expand-lg navbar-expand-md bg-primary fixed-top" data-bs-theme="dark">
            <div class="container-fluid col-11 col-lg-10 col-xl-9">

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav mx-auto">
                        <li class="nav-item">

                    <ul class="navbar-nav">

                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        
    </header>

    <main class="pt-5 mt-5 mb-5 bg-ligth">
        <h1 class="h1 text-center fw-bold mb-5 text-primary">Nous Contacter</h1>

        <div class="container-fluid col-11 col-lg-8 col-xl-6 p-3 p-sm-5 rounded-4 bg-secondary shadow-lg">
            <form action="#" method="post" class="row">
                <h4 class="text-primary w-bold">Vos informations</h4>
                <div class="mb-3">
                    <label for="first-name" class="form-label text-primary">Prénom <span class="text-danger">*</span></label>
                    <input id="first-name" name=""first-name" type="text" class="form-control" placeholder="John" required>
                </div>
                <div class="mb-3">
                    <label for="name" class="form-label text-primary">Nom <span class="text-danger">*</span></label>
                    <input id="name" type="text" name="name" class="form-control" placeholder="Doe" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label text-primary">Votre email <span class="text-danger">*</span></label>
                    <input id="email" name="email" type="email" class="form-control" placeholder="johndoe@mail.com" required>
                </div>

                <h4 class="text-primary w-bold mt-3">Comment nous aveez vous trouvez ? <span class="text-danger">*</span></h4>
                <div class="form-check mb-1 ms-3">
                    <label class="form-check-label text-primary" for="LinkedIn">
                        LinkedIn
                    </label>
                    <input class="form-check-input" type="radio" name="choice" id="LinkedIn" value="LinkedIn" required>
                </div>
                <div class="form-check mb-1 ms-3">
                    <label class="form-check-label text-primary" for="github">
                        Github
                    </label>
                    <input class="form-check-input" type="radio" name="choice" id="github" value="github" required>
                </div>
                <div class="form-check mb-1 ms-3">
                    <label class="form-check-label text-primary" for="portfolio">
                        Portfolio
                    </label>
                    <input class="form-check-input text-primary" type="radio" name="choice" id="portfolio" value="portfolio" required>
                </div>
                <div class="form-check mb-1 ms-3">
                    <label class="form-check-label text-primary" for="autre">
                        Autre
                    </label>
                    <input class="form-check-input text-primary" type="radio" name="choice" id="autre" value="autre" required>
                </div>

                <h4 class="text-primary w-bold mt-3">Message</h4>
                <div class="mb-3">
                    <label for="message" class="form-label text-primary">Votre message <span class="text-danger">*</span></label>
                    <textarea rows="10" name="message" id="message" placeholder="Votre message" class="form-control" style="resize: none;" required></textarea>
                </div>

                <div class="d-flex flex-column flex-md-row">
                  <button class="col-md-6 btn btn-primary mt-2" type="submit">Soumettre</button>
                  <button class="col-md-6 btn btn-outline-primary mt-2" type="reset">Réinitialiser</button>
                </div>

                <span class="text-danger mt-3">* : champ obligatoire</span>
            </form>
        </div>

    </main>

    <!-- JS Bootsrap script -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
